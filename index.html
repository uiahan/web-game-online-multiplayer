<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TicTacToe Online</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,600;9..144,700&family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root {
  --bg-1: #f6ede3;
  --bg-2: #ecd9c4;
  --bg-3: #dde8ef;
  --panel: #f7efe6;
  --panel-border: #e5d6c4;
  --text: #7e5f4b;
  --muted: #a7876f;
  --accent: #a2c4d9;
  --accent-2: #f3d8b8;
  --danger: #c97963;
  --cell: #fcf6ef;
  --cell-hover: #f1e3d1;
  --shadow: rgba(164, 134, 106, 0.22);
}

* {
  box-sizing: border-box;
}

html, body {
  min-height: 100%;
}

body {
  margin: 0;
  font-family: "Manrope", ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  color: var(--text);
  background:
    radial-gradient(circle at 18% 12%, rgba(162, 196, 217, 0.7), transparent 18%),
    radial-gradient(circle at 82% 14%, rgba(243, 216, 184, 0.8), transparent 18%),
    radial-gradient(circle at 50% 100%, rgba(221, 232, 239, 0.85), transparent 36%),
    linear-gradient(145deg, var(--bg-1) 0%, #f0e3d5 48%, var(--bg-3) 100%);
  display: grid;
  place-items: center;
  padding: 32px 16px;
  position: relative;
  overflow: hidden;
}

body::before {
  content: "";
  position: fixed;
  inset: 0;
  pointer-events: none;
  background:
    linear-gradient(115deg, rgba(255, 255, 255, 0.28) 0 1px, transparent 1px 100%),
    linear-gradient(25deg, rgba(255, 255, 255, 0.14) 0 1px, transparent 1px 100%);
  background-size: 100% 100%, 100% 100%;
  mix-blend-mode: soft-light;
  opacity: 0.45;
}

.app-shell {
  width: min(92vw, 520px);
  background: linear-gradient(180deg, rgba(255, 250, 245, 0.96), rgba(247, 239, 230, 0.98));
  border: 1px solid var(--panel-border);
  border-radius: 28px;
  padding: 28px;
  box-shadow: 0 22px 55px var(--shadow);
  position: relative;
}

.app-shell::after {
  content: "";
  position: absolute;
  inset: 14px;
  border-radius: 22px;
  border: 1px solid rgba(255, 255, 255, 0.55);
  pointer-events: none;
}

.eyebrow {
  text-transform: uppercase;
  letter-spacing: 0.28em;
  font-size: 0.72rem;
  color: var(--muted);
  margin: 0 0 10px;
}

h1 {
  margin: 0;
  font-family: "Fraunces", Georgia, serif;
  font-size: clamp(2rem, 5vw, 3rem);
  line-height: 1;
  color: #8e6c57;
}

.subtitle {
  margin: 10px 0 20px;
  color: var(--muted);
  line-height: 1.6;
}

.status-row {
  display: flex;
  flex-wrap: wrap;
  gap: 10px;
  align-items: stretch;
  justify-content: space-between;
  margin-bottom: 18px;
}

.status-stack {
  display: grid;
  gap: 6px;
  flex: 1 1 220px;
}

#status, #roomInfo, #roleInfo {
  margin: 0;
}

#status {
  font-weight: 600;
  font-size: 1rem;
}

#roleInfo {
  color: var(--muted);
  font-size: 0.92rem;
}

.pill {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  padding: 8px 12px;
  border-radius: 999px;
  background: linear-gradient(180deg, #f3e4d1, #ead7c0);
  color: #8a694f;
  font-size: 0.9rem;
  border: 1px solid rgba(174, 140, 111, 0.18);
  box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.6);
  align-self: start;
}

#board {
  display: grid;
  grid-template-columns: repeat(3, minmax(0, 1fr));
  gap: 12px;
  margin-top: 10px;
}

.cell {
  aspect-ratio: 1;
  border: 1px solid rgba(176, 145, 119, 0.18);
  border-radius: 20px;
  background: linear-gradient(180deg, #fcf7f1, #f4e6d6);
  color: var(--text);
  font-size: clamp(2rem, 7vw, 3.5rem);
  font-weight: 800;
  cursor: pointer;
  transition: transform 0.18s ease, border-color 0.18s ease, background 0.18s ease, box-shadow 0.18s ease;
  box-shadow: 0 10px 20px rgba(174, 140, 111, 0.09), inset 0 1px 0 rgba(255, 255, 255, 0.7);
}

.cell:hover:not(:disabled) {
  transform: translateY(-2px);
  border-color: rgba(162, 196, 217, 0.8);
  background: linear-gradient(180deg, #f8f1e8, #efddc9);
  box-shadow: 0 14px 28px rgba(174, 140, 111, 0.14);
}

.cell:disabled {
  cursor: default;
  opacity: 0.92;
}

.x {
  color: #7ea6be;
}

.o {
  color: #b78663;
}

.footer-note {
  margin-top: 16px;
  color: var(--muted);
  font-size: 0.92rem;
}

@media (max-width: 480px) {
  .app-shell {
    padding: 22px 16px;
    border-radius: 22px;
  }

  .status-row {
    flex-direction: column;
    align-items: flex-start;
  }

  .pill {
    width: 100%;
    justify-content: center;
  }
}
</style>
</head>
<body>

<main class="app-shell">
  <p class="eyebrow">Warm Multiplayer</p>
  <h1>TicTacToe Online</h1>
  <p class="subtitle">Main bareng teman dalam satu room, dengan tampilan hangat seperti palette yang kamu kasih.</p>

  <div class="status-row">
    <div class="status-stack">
      <p id="status">Loading...</p>
      <p id="roleInfo">Kamu: -</p>
    </div>
    <p id="roomInfo" class="pill">Room: -</p>
  </div>

  <div id="board" aria-label="TicTacToe board"></div>
  <p class="footer-note">Tip: buka link room yang sama di dua tab atau dua perangkat untuk main bareng.</p>
</main>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
<script>
const SUPABASE_URL = "https://vgqzzmghoyfhwukksbzv.supabase.co";
const SUPABASE_KEY = "sb_publishable_ZZmh_NNgicmaPLY2HXO2yw_am3UB8h4";

const client = window.supabase.createClient(
  SUPABASE_URL,
  SUPABASE_KEY
);

let roomId = new URLSearchParams(window.location.search).get("room");
let player = null;
let currentRoom = null;
let lastAnnouncedResult = "";
let syncTimer = null;

const boardDiv = document.getElementById("board");
const statusText = document.getElementById("status");
const roomInfo = document.getElementById("roomInfo");
const roleInfo = document.getElementById("roleInfo");

function getWinner(board) {
  return checkWinner(board);
}

function renderBoard(board, room) {
  boardDiv.innerHTML = "";
  board.split("").forEach((cell, i) => {
    const btn = document.createElement("button");
    btn.className = "cell" + (cell === "X" ? " x" : cell === "O" ? " o" : "");
    btn.innerText = cell === "-" ? "" : cell;
    btn.setAttribute("aria-label", `Cell ${i + 1}${cell === '-' ? '' : ': ' + cell}`);
    btn.disabled = !room || !!getWinner(room.board) || room.turn !== player || cell !== "-";
    btn.onclick = () => makeMove(i);
    boardDiv.appendChild(btn);
  });
}

function checkWinner(board) {
  const win = [
    [0,1,2],[3,4,5],[6,7,8],
    [0,3,6],[1,4,7],[2,5,8],
    [0,4,8],[2,4,6]
  ];

  for (let combo of win) {
    const [a,b,c] = combo;
    if (board[a] !== "-" && board[a] === board[b] && board[a] === board[c]) {
      return board[a];
    }
  }

  if (!board.includes("-")) return "draw";
  return null;
}

function getOutcomeKey(room, winner) {
  return `${room.id}:${room.board}:${room.turn}:${winner}`;
}

function announceOutcome(room, winner) {
  if (!winner) return;

  const outcomeKey = getOutcomeKey(room, winner);
  if (lastAnnouncedResult === outcomeKey) return;

  lastAnnouncedResult = outcomeKey;
  window.setTimeout(() => {
    alert(winner === "draw" ? "Hasil seri!" : `${winner} menang!`);
  }, 150);
}

async function createRoom() {
  const { data } = await client.from("rooms").insert({
    board: "---------",
    turn: "X",
    player_x: null,
    player_o: null
  }).select().single();

  window.location.href = "?room=" + data.id;
}

async function joinRoom() {
  const { data: room } = await client
    .from("rooms")
    .select("*")
    .eq("id", roomId)
    .single();

  if (!room.player_x) {
    player = "X";
    localStorage.setItem("player", player);
    await client.from("rooms").update({ player_x: "joined" }).eq("id", roomId);
  } else if (!room.player_o) {
    player = "O";
    localStorage.setItem("player", player);
    await client.from("rooms").update({ player_o: "joined" }).eq("id", roomId);
  } else {
    player = localStorage.getItem("player");
  }
}

function renderRoom(room) {
  currentRoom = room;

  renderBoard(room.board, room);

  const winner = getWinner(room.board);
  roomInfo.innerText = `Room: ${room.id}`;
  roleInfo.innerText = player ? `Kamu: ${player}` : "Kamu: penonton";

  announceOutcome(room, winner);

  if (winner === "draw") {
    statusText.innerText = "Hasil: seri";
    return;
  }

  if (winner) {
    statusText.innerText = winner === player ? "Kamu menang" : `Pemenang: ${winner}`;
    return;
  }

  if (!room.player_x || !room.player_o) {
    statusText.innerText = "Menunggu player lain...";
    return;
  }

  if (!player) {
    statusText.innerText = "Kamu sebagai penonton";
    return;
  }

  statusText.innerText = room.turn === player ? `Giliran kamu (${player})` : `Menunggu giliran ${room.turn}`;
}

async function refreshRoom() {
  if (!roomId) return;

  const { data: room } = await client
    .from("rooms")
    .select("*")
    .eq("id", roomId)
    .single();

  if (room) {
    updateUI(room);
  }
}

async function makeMove(index) {
  if (!currentRoom) return;

  const winnerBeforeMove = getWinner(currentRoom.board);
  if (winnerBeforeMove || currentRoom.turn !== player) return;

  const { data: room } = await client
    .from("rooms")
    .select("*")
    .eq("id", roomId)
    .single();

  if (room.turn !== player) return;

  let board = room.board.split("");

  if (board[index] !== "-") return;

  board[index] = player;

  const winner = checkWinner(board.join(""));
  const nextTurn = player === "X" ? "O" : "X";
  const updatedRoom = {
    ...room,
    board: board.join(""),
    turn: winner ? room.turn : nextTurn
  };

  await client.from("rooms").update({
    board: updatedRoom.board,
    turn: updatedRoom.turn
  }).eq("id", roomId);

  renderRoom(updatedRoom);
}

function updateUI(room) {
  renderRoom(room);
}

async function init() {
  if (!roomId) {
    await createRoom();
    return;
  }

  await joinRoom();

  await refreshRoom();

  if (syncTimer) clearInterval(syncTimer);
  syncTimer = setInterval(refreshRoom, 1500);

  window.addEventListener("focus", refreshRoom);
  document.addEventListener("visibilitychange", () => {
    if (!document.hidden) {
      refreshRoom();
    }
  });

  client
    .channel("room-" + roomId)
    .on(
      "postgres_changes",
      { event: "*", schema: "public", table: "rooms", filter: `id=eq.${roomId}` },
      payload => {
        if (payload.new) {
          updateUI(payload.new);
        }
      }
    )
    .subscribe();
}

init();
</script>

</body>
</html>
