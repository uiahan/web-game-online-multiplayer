<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TicTacToe Online</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,600;9..144,700&family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #c9d3dd;
  --panel: #f8f1e8;
  --panel-soft: #f1e3d1;
  --panel-border: #d6c5b0;
  --text: #7b604c;
  --muted: #9a7b63;
  --accent: #a2c4d9;
  --accent-soft: #f3d8b8;
  --danger: #c76d5d;
  --cell: #fbf6ef;
  --cell-hover: #efe1cf;
  --shadow: rgba(112, 92, 74, 0.18);
}

* {
  box-sizing: border-box;
}

html, body {
  min-height: 100%;
}

body {
  margin: 0;
  font-family: "Manrope", ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  color: var(--text);
  background: var(--bg);
  display: grid;
  place-items: center;
  padding: 32px 16px;
  position: relative;
  overflow: hidden;
}

.app-shell {
  width: min(92vw, 520px);
  background: var(--panel);
  border: 1px solid var(--panel-border);
  border-radius: 28px;
  padding: 28px;
  box-shadow: 0 22px 55px var(--shadow);
  position: relative;
}

.app-shell::after {
  content: "";
  position: absolute;
  inset: 14px;
  border-radius: 22px;
  border: 1px solid rgba(255, 255, 255, 0.55);
  pointer-events: none;
}

.eyebrow {
  text-transform: uppercase;
  letter-spacing: 0.28em;
  font-size: 0.72rem;
  color: var(--muted);
  margin: 0 0 10px;
}

h1 {
  margin: 0;
  font-family: "Fraunces", Georgia, serif;
  font-size: clamp(2rem, 5vw, 3rem);
  line-height: 1;
  color: #85664f;
}

.subtitle {
  margin: 10px 0 20px;
  color: var(--muted);
  line-height: 1.6;
}

.status-row {
  display: flex;
  flex-wrap: wrap;
  gap: 10px;
  align-items: flex-start;
  justify-content: space-between;
  margin-bottom: 18px;
}

.status-stack {
  display: grid;
  gap: 6px;
  flex: 1 1 220px;
}

#status, #roomInfo, #roleInfo {
  margin: 0;
}

#status {
  font-weight: 600;
  font-size: 1rem;
}

#roleInfo {
  color: var(--muted);
  font-size: 0.92rem;
}

.waiting-card {
  margin-bottom: 18px;
  padding: 16px;
  border-radius: 20px;
  border: 1px solid rgba(214, 197, 176, 0.85);
  background: var(--panel-soft);
}

.waiting-card .status-stack {
  margin-bottom: 12px;
}

.waiting-card.is-waiting {
  border-color: rgba(162, 196, 217, 0.9);
  box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.6);
}

.pill {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  padding: 8px 12px;
  border-radius: 999px;
  background: var(--panel-soft);
  color: #8a694f;
  font-size: 0.9rem;
  border: 1px solid rgba(174, 140, 111, 0.18);
  box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.6);
  align-self: start;
}

.room-actions {
  display: flex;
  gap: 10px;
  margin-top: 12px;
  flex-wrap: wrap;
}

.action-btn {
  appearance: none;
  border: 1px solid rgba(174, 140, 111, 0.22);
  background: var(--cell);
  color: var(--text);
  border-radius: 999px;
  padding: 10px 14px;
  font: inherit;
  font-weight: 700;
  cursor: pointer;
  box-shadow: 0 8px 16px rgba(112, 92, 74, 0.08);
  transition: transform 0.18s ease, border-color 0.18s ease, background 0.18s ease;
}

.action-btn:hover:not(:disabled) {
  transform: translateY(-1px);
  border-color: rgba(162, 196, 217, 0.85);
  background: var(--panel-soft);
}

.action-btn:disabled {
  cursor: not-allowed;
  opacity: 0.55;
}

#board {
  display: grid;
  grid-template-columns: repeat(3, minmax(0, 1fr));
  gap: 12px;
  margin-top: 10px;
}

.cell {
  aspect-ratio: 1;
  border: 1px solid rgba(176, 145, 119, 0.18);
  border-radius: 20px;
  background: var(--cell);
  color: var(--text);
  font-size: clamp(2rem, 7vw, 3.5rem);
  font-weight: 800;
  cursor: pointer;
  transition: transform 0.18s ease, border-color 0.18s ease, background 0.18s ease, box-shadow 0.18s ease;
  box-shadow: 0 10px 20px rgba(174, 140, 111, 0.09), inset 0 1px 0 rgba(255, 255, 255, 0.7);
}

.cell:hover:not(:disabled) {
  transform: translateY(-2px);
  border-color: rgba(162, 196, 217, 0.8);
  background: var(--cell-hover);
  box-shadow: 0 14px 28px rgba(174, 140, 111, 0.14);
}

.cell:disabled {
  cursor: default;
  opacity: 0.92;
}

.x {
  color: #7ea6be;
}

.o {
  color: #b78663;
}

.game-modal {
  position: fixed;
  inset: 0;
  display: none;
  align-items: center;
  justify-content: center;
  padding: 20px;
  background: rgba(123, 96, 76, 0.24);
  z-index: 20;
}

.game-modal.is-open {
  display: flex;
}

.game-modal-card {
  width: min(100%, 360px);
  border-radius: 24px;
  border: 1px solid rgba(214, 197, 176, 0.9);
  background: var(--panel);
  box-shadow: 0 26px 60px rgba(112, 92, 74, 0.2);
  padding: 22px;
  text-align: center;
}

.game-modal-title {
  margin: 0;
  font-family: "Fraunces", Georgia, serif;
  font-size: 2rem;
  color: #85664f;
}

.game-modal-text {
  margin: 8px 0 18px;
  color: var(--muted);
  line-height: 1.5;
}

.game-modal-actions {
  display: flex;
  gap: 10px;
  justify-content: center;
  flex-wrap: wrap;
}

.game-modal-actions .action-btn {
  min-width: 120px;
}

@media (max-width: 480px) {
  .app-shell {
    padding: 22px 16px;
    border-radius: 22px;
  }

  .status-row {
    flex-direction: column;
    align-items: flex-start;
  }

  .pill {
    width: 100%;
    justify-content: center;
  }
}
</style>
</head>
<body>

<main class="app-shell">
  <h1 style="text-align: center;">TicTacToe Online</h1>

  <div class="waiting-card" id="statusCard">
    <div class="status-row">
      <div class="status-stack">
      <p id="status">Loading...</p>
      <p id="roleInfo">Kamu: -</p>
      </div>
      <p id="roomInfo" class="pill">Room: -</p>
    </div>
    <div class="room-actions">
      <button id="shareWhatsAppBtn" class="action-btn" type="button">Bagikan ke WhatsApp</button>
    </div>
  </div>

  <div id="board" aria-label="TicTacToe board"></div>
</main>

<div id="gameModal" class="game-modal" aria-hidden="true">
  <div class="game-modal-card" role="dialog" aria-modal="true" aria-labelledby="gameModalTitle">
    <h2 id="gameModalTitle" class="game-modal-title">Game selesai</h2>
    <p id="gameModalText" class="game-modal-text">-</p>
    <div class="game-modal-actions">
      <button id="gameModalCloseBtn" class="action-btn" type="button">Tutup</button>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
<script>
const SUPABASE_URL = "https://vgqzzmghoyfhwukksbzv.supabase.co";
const SUPABASE_KEY = "sb_publishable_ZZmh_NNgicmaPLY2HXO2yw_am3UB8h4";

const client = window.supabase.createClient(
  SUPABASE_URL,
  SUPABASE_KEY
);

let roomId = new URLSearchParams(window.location.search).get("room");
let player = null;
let currentRoom = null;
let lastAnnouncedResult = "";
let syncTimer = null;

const boardDiv = document.getElementById("board");
const statusText = document.getElementById("status");
const roomInfo = document.getElementById("roomInfo");
const roleInfo = document.getElementById("roleInfo");
const statusCard = document.getElementById("statusCard");
const shareWhatsAppBtn = document.getElementById("shareWhatsAppBtn");
const gameModal = document.getElementById("gameModal");
const gameModalText = document.getElementById("gameModalText");
const gameModalCloseBtn = document.getElementById("gameModalCloseBtn");

function getWinner(board) {
  return checkWinner(board);
}

function renderBoard(board, room) {
  boardDiv.innerHTML = "";
  board.split("").forEach((cell, i) => {
    const btn = document.createElement("button");
    btn.className = "cell" + (cell === "X" ? " x" : cell === "O" ? " o" : "");
    btn.innerText = cell === "-" ? "" : cell;
    btn.setAttribute("aria-label", `Cell ${i + 1}${cell === '-' ? '' : ': ' + cell}`);
    btn.disabled = !room || !!getWinner(room.board) || room.turn !== player || cell !== "-";
    btn.onclick = () => makeMove(i);
    boardDiv.appendChild(btn);
  });
}

function checkWinner(board) {
  const win = [
    [0,1,2],[3,4,5],[6,7,8],
    [0,3,6],[1,4,7],[2,5,8],
    [0,4,8],[2,4,6]
  ];

  for (let combo of win) {
    const [a,b,c] = combo;
    if (board[a] !== "-" && board[a] === board[b] && board[a] === board[c]) {
      return board[a];
    }
  }

  if (!board.includes("-")) return "draw";
  return null;
}

function getOutcomeKey(room, winner) {
  return `${room.id}:${room.board}:${room.turn}:${winner}`;
}

function announceOutcome(room, winner) {
  if (!winner) return;

  const outcomeKey = getOutcomeKey(room, winner);
  if (lastAnnouncedResult === outcomeKey) return;

  lastAnnouncedResult = outcomeKey;
  const message = winner === "draw"
    ? "Permainan berakhir seri."
    : `${winner} keluar sebagai pemenang.`;

  openOutcomeModal(winner === "draw" ? "Hasil seri" : "Selamat", message);
}

function openOutcomeModal(title, message) {
  document.getElementById("gameModalTitle").innerText = title;
  gameModalText.innerText = message;
  gameModal.classList.add("is-open");
  gameModal.setAttribute("aria-hidden", "false");
}

function closeOutcomeModal() {
  gameModal.classList.remove("is-open");
  gameModal.setAttribute("aria-hidden", "true");
}

async function createRoom() {
  const { data } = await client.from("rooms").insert({
    board: "---------",
    turn: "X",
    player_x: null,
    player_o: null
  }).select().single();

  window.location.href = "?room=" + data.id;
}

async function joinRoom() {
  const { data: room } = await client
    .from("rooms")
    .select("*")
    .eq("id", roomId)
    .single();

  if (!room.player_x) {
    player = "X";
    localStorage.setItem("player", player);
    await client.from("rooms").update({ player_x: "joined" }).eq("id", roomId);
  } else if (!room.player_o) {
    player = "O";
    localStorage.setItem("player", player);
    await client.from("rooms").update({ player_o: "joined" }).eq("id", roomId);
  } else {
    player = localStorage.getItem("player");
  }
}

function renderRoom(room) {
  currentRoom = room;

  renderBoard(room.board, room);

  const winner = getWinner(room.board);
  roomInfo.innerText = `Room: ${room.id}`;
  roleInfo.innerText = player ? `Kamu bermain sebagai ${player}` : "Kamu sedang menonton";

  statusCard.classList.toggle("is-waiting", !winner && (!room.player_x || !room.player_o));

  announceOutcome(room, winner);

  if (winner === "draw") {
    statusText.innerText = "Permainan selesai, hasilnya seri.";
    return;
  }

  if (winner) {
    statusText.innerText = winner === player ? "Kamu menang!" : `Pemenang: ${winner}`;
    return;
  }

  if (!room.player_x || !room.player_o) {
    if (!room.player_x && !room.player_o) {
      statusText.innerText = "Menunggu pemain pertama bergabung.";
    } else {
      statusText.innerText = "Menunggu satu pemain lagi bergabung.";
    }
    return;
  }

  if (!player) {
    statusText.innerText = "Kamu sedang menonton permainan ini.";
    return;
  }

  if (room.turn === player) {
    statusText.innerText = `Giliran kamu sebagai ${player}.`;
  } else {
    statusText.innerText = `Sekarang giliran ${room.turn}.`;
  }
}

async function refreshRoom() {
  if (!roomId) return;

  const { data: room } = await client
    .from("rooms")
    .select("*")
    .eq("id", roomId)
    .single();

  if (room) {
    updateUI(room);
  }
}

async function makeMove(index) {
  if (!currentRoom) return;

  const winnerBeforeMove = getWinner(currentRoom.board);
  if (winnerBeforeMove || currentRoom.turn !== player) return;

  const { data: room } = await client
    .from("rooms")
    .select("*")
    .eq("id", roomId)
    .single();

  if (room.turn !== player) return;

  let board = room.board.split("");

  if (board[index] !== "-") return;

  board[index] = player;

  const winner = checkWinner(board.join(""));
  const nextTurn = player === "X" ? "O" : "X";
  const updatedRoom = {
    ...room,
    board: board.join(""),
    turn: winner ? room.turn : nextTurn
  };

  await client.from("rooms").update({
    board: updatedRoom.board,
    turn: updatedRoom.turn
  }).eq("id", roomId);

  renderRoom(updatedRoom);
}

function getShareUrl() {
  const url = new URL(window.location.href);
  if (roomId) {
    url.searchParams.set("room", roomId);
  }
  return url.toString();
}

async function shareRoomToWhatsApp() {
  const shareUrl = getShareUrl();
  const text = `Yuk main TicTacToe bareng di room ini: ${shareUrl}`;
  const whatsappUrl = `https://wa.me/?text=${encodeURIComponent(text)}`;

  window.open(whatsappUrl, "_blank", "noopener,noreferrer");
}

function updateUI(room) {
  renderRoom(room);
}

async function init() {
  if (!roomId) {
    await createRoom();
    return;
  }

  await joinRoom();

  await refreshRoom();

  if (syncTimer) clearInterval(syncTimer);
  syncTimer = setInterval(refreshRoom, 1500);

  window.addEventListener("focus", refreshRoom);
  document.addEventListener("visibilitychange", () => {
    if (!document.hidden) {
      refreshRoom();
    }
  });

  client
    .channel("room-" + roomId)
    .on(
      "postgres_changes",
      { event: "*", schema: "public", table: "rooms", filter: `id=eq.${roomId}` },
      payload => {
        if (payload.new) {
          updateUI(payload.new);
        }
      }
    )
    .subscribe();
}

shareWhatsAppBtn.addEventListener("click", shareRoomToWhatsApp);
gameModalCloseBtn.addEventListener("click", closeOutcomeModal);
gameModal.addEventListener("click", event => {
  if (event.target === gameModal) {
    closeOutcomeModal();
  }
});

init();
</script>

</body>
</html>
