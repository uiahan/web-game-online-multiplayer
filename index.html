<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TicTacToe Online</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,600;9..144,700&family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #c9d3dd;
  --panel: #f8f1e8;
  --panel-soft: #f1e3d1;
  --panel-border: #d6c5b0;
  --text: #7b604c;
  --muted: #9a7b63;
  --accent: #a2c4d9;
  --accent-soft: #f3d8b8;
  --danger: #c76d5d;
  --cell: #fbf6ef;
  --cell-hover: #efe1cf;
  --shadow: rgba(112, 92, 74, 0.18);
}

* {
  box-sizing: border-box;
}

html, body {
  min-height: 100%;
}

body {
  margin: 0;
  font-family: "Manrope", ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  color: var(--text);
  background: var(--bg);
  display: grid;
  place-items: center;
  min-height: 100svh;
  padding: clamp(10px, 2.4vw, 24px);
  position: relative;
  overflow: auto;
}

.app-shell {
  width: min(100%, 560px);
  background: var(--panel);
  border: 1px solid var(--panel-border);
  border-radius: 28px;
  padding: clamp(16px, 3vw, 26px);
  box-shadow: 0 22px 55px var(--shadow);
  position: relative;
  display: grid;
  gap: 14px;
  grid-template-rows: auto minmax(0, 1fr);
  max-height: calc(100svh - 24px);
  animation: cardEnter 0.6s ease both;
}

.app-shell::after {
  content: "";
  position: absolute;
  inset: 14px;
  border-radius: 22px;
  border: 1px solid rgba(255, 255, 255, 0.55);
  pointer-events: none;
}

h1 {
  margin: 0;
  font-family: "Fraunces", Georgia, serif;
  font-size: clamp(1.8rem, 5vw, 2.8rem);
  line-height: 1;
  color: #85664f;
  display: inline-flex;
  align-items: center;
  gap: 10px;
}

.title-icon,
.pill-icon,
.button-icon,
.status-icon {
  display: inline-grid;
  place-items: center;
  flex: 0 0 auto;
  width: 1.55rem;
  height: 1.55rem;
  border-radius: 999px;
  background: rgba(255, 255, 255, 0.5);
  border: 1px solid rgba(174, 140, 111, 0.16);
  color: #85664f;
  font-size: 0.82rem;
  line-height: 1;
}

.title-icon {
  background: var(--panel-soft);
  box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.6);
}

.subtitle {
  margin: 8px 0 0;
  color: var(--muted);
  line-height: 1.6;
}

.topbar {
  display: flex;
  gap: 12px;
  align-items: flex-end;
  justify-content: space-between;
}

.topbar-copy {
  min-width: 0;
}

#status, #roomInfo, #roleInfo {
  margin: 0;
}

#roleInfo {
  color: var(--muted);
  font-size: 0.92rem;
}

.status-strip {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-top: 12px;
  padding: 10px 12px;
  border-radius: 16px;
  border: 1px solid rgba(214, 197, 176, 0.72);
  background: rgba(248, 241, 232, 0.95);
  box-shadow: 0 10px 20px rgba(112, 92, 74, 0.08);
  font-weight: 600;
  font-size: 0.98rem;
}

.status-strip #statusText {
  line-height: 1.35;
}

.status-strip.state-waiting {
  border-color: rgba(199, 109, 93, 0.55);
  background: rgba(252, 236, 232, 0.98);
}

.status-strip.state-opponent-turn {
  border-color: rgba(199, 109, 93, 0.75);
  background: rgba(250, 230, 225, 0.98);
}

.status-strip.state-my-turn {
  border-color: rgba(73, 132, 83, 0.65);
  background: rgba(235, 246, 232, 0.98);
}

.status-strip.state-finished {
  border-color: rgba(162, 196, 217, 0.72);
  background: rgba(238, 244, 248, 0.98);
}

.top-actions {
  display: flex;
  gap: 10px;
  align-items: center;
  flex-wrap: wrap;
  justify-content: flex-end;
}

.pill {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  padding: 8px 12px;
  border-radius: 999px;
  background: var(--panel-soft);
  color: #8a694f;
  font-size: 0.9rem;
  border: 1px solid rgba(174, 140, 111, 0.18);
  box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.6);
  align-self: start;
  animation: popIn 0.4s ease both;
}

.action-btn {
  appearance: none;
  border: 1px solid rgba(174, 140, 111, 0.22);
  background: var(--cell);
  color: var(--text);
  border-radius: 999px;
  padding: 10px 14px;
  font: inherit;
  font-weight: 700;
  cursor: pointer;
  box-shadow: 0 8px 16px rgba(112, 92, 74, 0.08);
  transition: transform 0.18s ease, border-color 0.18s ease, background 0.18s ease;
  display: inline-flex;
  align-items: center;
  gap: 8px;
  animation: popIn 0.45s ease both;
}

.action-btn:hover:not(:disabled) {
  transform: translateY(-1px);
  border-color: rgba(162, 196, 217, 0.85);
  background: var(--panel-soft);
}

.action-btn:disabled {
  cursor: not-allowed;
  opacity: 0.55;
}

.board-shell {
  position: relative;
  border-radius: 24px;
  border: 1px solid rgba(214, 197, 176, 0.9);
  background: var(--panel-soft);
  padding: 10px;
  min-height: 0;
  flex: 1 1 auto;
  overflow: visible;
  display: grid;
  animation: riseIn 0.5s ease both;
}

.status-icon {
  background: #f4ece1;
  color: #744e3d;
  border-color: rgba(174, 140, 111, 0.18);
  animation: pulseSoft 1.8s ease-in-out infinite;
}

.board-shell.state-waiting {
  border-color: rgba(199, 109, 93, 0.88);
}

.board-shell.state-waiting::before,
.board-shell.state-opponent-turn::before,
.board-shell.state-my-turn::before,
.board-shell.state-finished::before {
  content: "";
  position: absolute;
  inset: 0;
  border-radius: 24px;
  pointer-events: none;
}

.board-shell.state-waiting::before {
  background: rgba(199, 109, 93, 0.16);
}

.board-shell.state-waiting .board-overlay,
.board-shell.state-opponent-turn .board-overlay {
  border-color: rgba(199, 109, 93, 0.55);
  background: rgba(252, 236, 232, 0.98);
}

.board-shell.state-opponent-turn {
  border-color: rgba(199, 109, 93, 0.92);
}

.board-shell.state-opponent-turn::before {
  background: rgba(199, 109, 93, 0.16);
}

.board-shell.state-my-turn {
  border-color: rgba(73, 132, 83, 0.9);
}

.board-shell.state-my-turn::before {
  background: rgba(73, 132, 83, 0.16);
}

.board-shell.state-my-turn .board-overlay {
  border-color: rgba(73, 132, 83, 0.45);
  background: rgba(235, 246, 232, 0.98);
}

.board-shell.state-my-turn .cell:not(:disabled) {
  border-color: rgba(73, 132, 83, 0.82);
  background: #d9ebd5;
  box-shadow: 0 12px 20px rgba(73, 132, 83, 0.18), inset 0 1px 0 rgba(255, 255, 255, 0.84);
}

.board-shell.state-my-turn .cell:not(:disabled):hover {
  border-color: rgba(62, 118, 71, 0.96);
  background: #cfe3ca;
}

.board-shell.state-finished {
  border-color: rgba(162, 196, 217, 0.92);
}

.board-shell.state-finished::before {
  background: rgba(162, 196, 217, 0.14);
}

.board-shell.state-my-turn .status-icon {
  background: #d9ebd5;
  color: #3f7446;
}

.board-shell.state-opponent-turn .status-icon,
.board-shell.state-waiting .status-icon {
  background: #f5d8d4;
  color: #a44639;
}

.board-shell.state-finished .status-icon {
  background: #e4eef5;
  color: #67869d;
}

#board {
  display: grid;
  grid-template-columns: repeat(3, minmax(0, 1fr));
  grid-template-rows: repeat(3, minmax(0, 1fr));
  gap: clamp(4px, 1.1vw, 8px);
  margin-top: 0;
  width: 100%;
  aspect-ratio: 1 / 1;
  align-content: stretch;
  align-self: stretch;
}

.cell {
  aspect-ratio: 1;
  border: 1px solid rgba(176, 145, 119, 0.18);
  border-radius: 20px;
  background: var(--cell);
  color: var(--text);
  font-size: clamp(2rem, 7vw, 3.5rem);
  font-weight: 800;
  cursor: pointer;
  transition: transform 0.18s ease, border-color 0.18s ease, background 0.18s ease, box-shadow 0.18s ease;
  box-shadow: 0 10px 20px rgba(174, 140, 111, 0.09), inset 0 1px 0 rgba(255, 255, 255, 0.7);
}

.cell:hover:not(:disabled) {
  transform: translateY(-2px);
  border-color: rgba(162, 196, 217, 0.8);
  background: var(--cell-hover);
  box-shadow: 0 14px 28px rgba(174, 140, 111, 0.14);
}

.cell:disabled {
  cursor: default;
  opacity: 0.92;
}

.x {
  color: #7ea6be;
}

.o {
  color: #b78663;
}

.game-modal {
  position: fixed;
  inset: 0;
  display: none;
  align-items: center;
  justify-content: center;
  padding: 20px;
  background: rgba(123, 96, 76, 0.24);
  z-index: 20;
}

.game-modal.is-open {
  display: flex;
}

.game-modal-card {
  width: min(100%, 360px);
  border-radius: 24px;
  border: 1px solid rgba(214, 197, 176, 0.9);
  background: var(--panel);
  box-shadow: 0 26px 60px rgba(112, 92, 74, 0.2);
  padding: 22px;
  text-align: center;
  animation: modalPop 0.4s ease both;
}

.game-modal-title {
  margin: 0;
  font-family: "Fraunces", Georgia, serif;
  font-size: 2rem;
  color: #85664f;
}

.game-modal-text {
  margin: 8px 0 18px;
  color: var(--muted);
  line-height: 1.5;
}

.game-modal-actions {
  display: flex;
  gap: 10px;
  justify-content: center;
  flex-wrap: wrap;
}

.game-modal-actions .action-btn {
  min-width: 120px;
}

@media (max-width: 480px) {
  .app-shell {
    padding: 14px;
    border-radius: 22px;
    max-height: calc(100svh - 16px);
    width: min(100%, calc(100vw - 16px));
  }

  .topbar {
    flex-direction: column;
    align-items: stretch;
  }

  .top-actions {
    justify-content: stretch;
  }

  .top-actions .pill,
  .top-actions .action-btn {
    width: 100%;
  }

  .subtitle {
    display: none;
  }

  .board-shell {
    padding: 8px;
    min-height: 0;
  }

  #board {
    gap: 3px;
  }

  .status-strip {
    margin-top: 10px;
    padding: 8px 10px;
    font-size: 0.92rem;
    flex-wrap: wrap;
  }

  .cell {
    border-radius: 16px;
  }

  h1 {
    justify-content: center;
    text-align: center;
  }
}

@keyframes cardEnter {
  from {
    opacity: 0;
    transform: translateY(10px) scale(0.99);
  }
  to {
    opacity: 1;
    transform: translateY(0) scale(1);
  }
}

@keyframes riseIn {
  from {
    opacity: 0;
    transform: translateY(12px);
  }
  to {
    opacity: 1;
    transform: translateY(0);
  }
}

@keyframes popIn {
  from {
    opacity: 0;
    transform: translateY(6px) scale(0.98);
  }
  to {
    opacity: 1;
    transform: translateY(0) scale(1);
  }
}

@keyframes modalPop {
  from {
    opacity: 0;
    transform: translateY(12px) scale(0.96);
  }
  to {
    opacity: 1;
    transform: translateY(0) scale(1);
  }
}

@keyframes pulseSoft {
  0%, 100% {
    transform: scale(1);
    box-shadow: 0 0 0 0 rgba(133, 102, 79, 0.0);
  }
  50% {
    transform: scale(1.05);
    box-shadow: 0 0 0 5px rgba(133, 102, 79, 0.05);
  }
}

@media (prefers-reduced-motion: reduce) {
  *, *::before, *::after {
    animation: none !important;
    transition: none !important;
    scroll-behavior: auto !important;
  }
}
</style>
</head>
<body>

<main class="app-shell">
  <div class="topbar">
    <div class="topbar-copy">
      <h1><span class="title-icon" aria-hidden="true">✦</span><span>TicTacToe Online</span></h1>
      <p class="subtitle">Buat room, bagikan link, lalu main bareng secara realtime.</p>
    </div>
    <div class="top-actions">
      <p id="roomInfo" class="pill" title="Room: -"><span class="pill-icon" aria-hidden="true">◌</span><span id="roomInfoText">Room: -</span></p>
      <button id="shareWhatsAppBtn" class="action-btn" type="button"><span class="button-icon" aria-hidden="true">↗</span><span>Bagikan ke WhatsApp</span></button>
    </div>
  </div>

  <div class="status-strip" id="statusStrip">
    <span id="statusIcon" class="status-icon" aria-hidden="true">⌛</span>
    <span id="statusText">Loading...</span>
    <span id="roleInfo">Kamu: -</span>
  </div>

  <section class="board-shell state-waiting" id="statusCard">
    <div id="board" aria-label="TicTacToe board"></div>
  </section>
</main>

<div id="gameModal" class="game-modal" aria-hidden="true">
  <div class="game-modal-card" role="dialog" aria-modal="true" aria-labelledby="gameModalTitle">
    <h2 id="gameModalTitle" class="game-modal-title">Game selesai</h2>
    <p id="gameModalText" class="game-modal-text">-</p>
    <div class="game-modal-actions">
      <button id="gameModalRematchBtn" class="action-btn" type="button">Main Lagi</button>
      <button id="gameModalCloseBtn" class="action-btn" type="button">Tidak</button>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
<script>
const SUPABASE_URL = "https://vgqzzmghoyfhwukksbzv.supabase.co";
const SUPABASE_KEY = "sb_publishable_ZZmh_NNgicmaPLY2HXO2yw_am3UB8h4";

const client = window.supabase.createClient(
  SUPABASE_URL,
  SUPABASE_KEY
);

let roomId = new URLSearchParams(window.location.search).get("room");
let player = null;
let currentRoom = null;
let lastAnnouncedResult = "";
let lastModalKey = "";
let syncTimer = null;

const boardDiv = document.getElementById("board");
const statusMessage = document.getElementById("statusText");
const statusIcon = document.getElementById("statusIcon");
const roomInfo = document.getElementById("roomInfoText");
const roomInfoPill = document.getElementById("roomInfo");
const roleInfo = document.getElementById("roleInfo");
const statusStrip = document.getElementById("statusStrip");
const statusCard = document.getElementById("statusCard");
const shareWhatsAppBtn = document.getElementById("shareWhatsAppBtn");
const gameModal = document.getElementById("gameModal");
const gameModalText = document.getElementById("gameModalText");
const gameModalRematchBtn = document.getElementById("gameModalRematchBtn");
const gameModalCloseBtn = document.getElementById("gameModalCloseBtn");

function getWinner(board) {
  return checkWinner(board);
}

function renderBoard(board, room) {
  boardDiv.innerHTML = "";
  board.split("").forEach((cell, i) => {
    const btn = document.createElement("button");
    btn.className = "cell" + (cell === "X" ? " x" : cell === "O" ? " o" : "");
    btn.innerText = cell === "-" ? "" : cell;
    btn.setAttribute("aria-label", `Cell ${i + 1}${cell === '-' ? '' : ': ' + cell}`);
    const canPlay = !!room && !getWinner(room.board) && room.turn === player && room.player_x && room.player_o;
    btn.disabled = !canPlay || cell !== "-";
    btn.onclick = () => makeMove(i);
    boardDiv.appendChild(btn);
  });
}

function checkWinner(board) {
  const win = [
    [0,1,2],[3,4,5],[6,7,8],
    [0,3,6],[1,4,7],[2,5,8],
    [0,4,8],[2,4,6]
  ];

  for (let combo of win) {
    const [a,b,c] = combo;
    if (board[a] !== "-" && board[a] === board[b] && board[a] === board[c]) {
      return board[a];
    }
  }

  if (!board.includes("-")) return "draw";
  return null;
}

function getOutcomeKey(room, winner) {
  return `${room.id}:${room.board}:${room.turn}:${winner}`;
}

function isRoomOwner() {
  return player === "X";
}

function shortRoomCode(roomIdValue) {
  if (!roomIdValue) return "-";
  if (roomIdValue.length <= 8) return roomIdValue;
  return `${roomIdValue.slice(0, 4)}…${roomIdValue.slice(-4)}`;
}

function announceOutcome(room, winner) {
  if (!winner) return;

  const outcomeKey = getOutcomeKey(room, winner);
  if (lastAnnouncedResult === outcomeKey) return;

  lastAnnouncedResult = outcomeKey;
  const message = winner === "draw"
    ? "Permainan berakhir seri."
    : `${winner} keluar sebagai pemenang.`;

  openOutcomeModal(room, winner, winner === "draw" ? "Hasil seri" : "Selamat", message);
}

function openOutcomeModal(room, winner, title, message) {
  document.getElementById("gameModalTitle").innerText = title;
  gameModalText.innerText = message;
  gameModal.classList.add("is-open");
  gameModal.setAttribute("aria-hidden", "false");

  const modalKey = getOutcomeKey(room, winner);
  if (lastModalKey === modalKey) return;
  lastModalKey = modalKey;

  const canRematch = isRoomOwner();
  gameModalRematchBtn.style.display = canRematch ? "inline-flex" : "none";
  gameModalCloseBtn.innerText = canRematch ? "Tidak" : "Tutup";
}

function closeOutcomeModal() {
  gameModal.classList.remove("is-open");
  gameModal.setAttribute("aria-hidden", "true");
}

async function createRoom() {
  const { data } = await client.from("rooms").insert({
    board: "---------",
    turn: "X",
    player_x: null,
    player_o: null
  }).select().single();

  window.location.href = "?room=" + data.id;
}

async function joinRoom() {
  const { data: room, error } = await client
    .from("rooms")
    .select("*")
    .eq("id", roomId)
    .single();

  if (error || !room) {
    statusMessage.innerText = "Room tidak ditemukan. Buat room baru atau cek link room-nya.";
    statusIcon.innerText = "!";
    statusStrip.className = "status-strip state-opponent-turn";
    statusStrip.classList.add("state-opponent-turn");
    roleInfo.innerText = "Kamu belum masuk ke room.";
    roomInfo.innerText = "Room: -";
    roomInfoPill.title = "Room: -";
    return false;
  }

  if (!room.player_x) {
    player = "X";
    localStorage.setItem("player", player);
    await client.from("rooms").update({ player_x: "joined" }).eq("id", roomId);
  } else if (!room.player_o) {
    player = "O";
    localStorage.setItem("player", player);
    await client.from("rooms").update({ player_o: "joined" }).eq("id", roomId);
  } else {
    player = localStorage.getItem("player");
  }

  return true;
}

async function resetRoom() {
  if (!currentRoom || !isRoomOwner()) return;

  const { error } = await client
    .from("rooms")
    .update({
      board: "---------",
      turn: "X"
    })
    .eq("id", roomId);

  if (!error) {
    lastAnnouncedResult = "";
    lastModalKey = "";
    closeOutcomeModal();
    await refreshRoom();
  }
}

function getStatusTextForRoom(room, winner) {
  if (winner === "draw") {
    return "Permainan selesai, hasilnya seri.";
  }

  if (winner) {
    return winner === player ? "Kamu menang!" : `Pemenang: ${winner}`;
  }

  if (!room.player_x || !room.player_o) {
    if (!room.player_x && !room.player_o) {
      return "Menunggu pemain pertama.";
    }

    return "Menunggu satu pemain lagi.";
  }

  if (!player) {
    return "Kamu sedang menonton permainan ini.";
  }

  return room.turn === player ? `Giliran kamu sebagai ${player}.` : `Giliran ${room.turn}.`;
}

function renderRoom(room) {
  currentRoom = room;

  renderBoard(room.board, room);

  const winner = getWinner(room.board);
  const shortCode = shortRoomCode(room.id);
  roomInfo.innerText = `Room: ${shortCode}`;
  roomInfoPill.title = `Room: ${room.id}`;
  roleInfo.innerText = player ? `Kamu bermain sebagai ${player}` : "Kamu sedang menonton";

  statusCard.classList.remove("state-waiting", "state-my-turn", "state-opponent-turn", "state-finished");
  statusStrip.classList.remove("state-waiting", "state-my-turn", "state-opponent-turn", "state-finished");

  if (winner) {
    statusCard.classList.add("state-finished");
    statusStrip.classList.add("state-finished");
    statusIcon.innerText = "✓";
  } else if (!room.player_x || !room.player_o) {
    statusCard.classList.add("state-waiting");
    statusStrip.classList.add("state-waiting");
    statusIcon.innerText = "⌛";
  } else if (player && room.turn === player) {
    statusCard.classList.add("state-my-turn");
    statusStrip.classList.add("state-my-turn");
    statusIcon.innerText = "●";
  } else {
    statusCard.classList.add("state-opponent-turn");
    statusStrip.classList.add("state-opponent-turn");
    statusIcon.innerText = "•";
  }

  const winner = getWinner(room.board);
  const modalKey = getOutcomeKey(room, winner);
  const canPromptRematch = !!winner && isRoomOwner();

  if (!winner) {
    lastModalKey = "";
    if (gameModal.classList.contains("is-open")) {
      closeOutcomeModal();
    }
  } else if (canPromptRematch && lastModalKey !== modalKey) {
    openOutcomeModal(
      room,
      winner,
      winner === "draw" ? "Hasil seri" : "Selamat",
      winner === "draw"
        ? "Permainan berakhir seri."
        : `${winner} keluar sebagai pemenang. Main lagi?`
    );
  } else if (!canPromptRematch && gameModal.classList.contains("is-open") && lastModalKey !== modalKey) {
    openOutcomeModal(
      room,
      winner,
      winner === "draw" ? "Hasil seri" : "Game selesai",
      winner === "draw"
        ? "Permainan berakhir seri. Menunggu pemilik room memilih main lagi atau tidak."
        : `${winner} menang. Menunggu pemilik room memilih main lagi atau tidak.`
    );
  }

  announceOutcome(room, winner);
  statusMessage.innerText = getStatusTextForRoom(room, winner);
}

async function refreshRoom() {
  if (!roomId) return;

  const { data: room } = await client
    .from("rooms")
    .select("*")
    .eq("id", roomId)
    .single();

  if (room) {
    updateUI(room);
  }
}

async function makeMove(index) {
  if (!currentRoom) return;

  const winnerBeforeMove = getWinner(currentRoom.board);
  if (winnerBeforeMove || currentRoom.turn !== player) return;

  const { data: room } = await client
    .from("rooms")
    .select("*")
    .eq("id", roomId)
    .single();

  if (!room) return;

  if (room.turn !== player) return;

  let board = room.board.split("");

  if (board[index] !== "-") return;

  board[index] = player;

  const winner = checkWinner(board.join(""));
  const nextTurn = player === "X" ? "O" : "X";
  const updatedRoom = {
    ...room,
    board: board.join(""),
    turn: winner ? room.turn : nextTurn
  };

  await client.from("rooms").update({
    board: updatedRoom.board,
    turn: updatedRoom.turn
  }).eq("id", roomId);

  renderRoom(updatedRoom);
}

function getShareUrl() {
  const url = new URL(window.location.href);
  if (roomId) {
    url.searchParams.set("room", roomId);
  }
  return url.toString();
}

async function shareRoomToWhatsApp() {
  const shareUrl = getShareUrl();
  const text = `Yuk main TicTacToe bareng di room ini: ${shareUrl}`;
  const whatsappUrl = `https://wa.me/?text=${encodeURIComponent(text)}`;

  window.open(whatsappUrl, "_blank", "noopener,noreferrer");
}

function updateUI(room) {
  renderRoom(room);
}

async function init() {
  if (!roomId) {
    await createRoom();
    return;
  }

  const joined = await joinRoom();
  if (!joined) return;

  await refreshRoom();

  if (syncTimer) clearInterval(syncTimer);
  syncTimer = setInterval(refreshRoom, 1500);

  window.addEventListener("focus", refreshRoom);
  document.addEventListener("visibilitychange", () => {
    if (!document.hidden) {
      refreshRoom();
    }
  });

  client
    .channel("room-" + roomId)
    .on(
      "postgres_changes",
      { event: "*", schema: "public", table: "rooms", filter: `id=eq.${roomId}` },
      payload => {
        if (payload.new) {
          updateUI(payload.new);
        }
      }
    )
    .subscribe();
}

shareWhatsAppBtn.addEventListener("click", shareRoomToWhatsApp);
gameModalRematchBtn.addEventListener("click", resetRoom);
gameModalCloseBtn.addEventListener("click", closeOutcomeModal);
gameModal.addEventListener("click", event => {
  if (event.target === gameModal) {
    closeOutcomeModal();
  }
});

init();
</script>
